<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>YT Music Auto-Liker</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 340px;
      padding: 15px;
      background-color: #0f0f0f;
      color: #fff;
      margin: 0;
    }
    h2 {
      margin-top: 5px;
      font-size: 18px;
    }
    .alert {
      background-color: #272727;
      border-left: 4px solid #cc0000;
      padding: 10px;
      font-size: 12px;
      color: #ddd;
      margin-bottom: 15px;
      border-radius: 0 4px 4px 0;
    }
    .alert a {
      color: #ffaa00;
      text-decoration: none;
      font-weight: bold;
    }
    .alert a:hover {
      text-decoration: underline;
    }
    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      background: #1e1e1e;
      border: 1px solid #3f3f3f;
      color: white;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 12px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #ffaa00;
    }
    .options {
      margin-top: 15px;
      background: #1a1a1a;
      padding: 10px;
      border-radius: 6px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background-color: #cc0000;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #ff0000;
    }
    #status {
      margin-top: 15px;
      padding: 10px;
      background: #1e1e1e;
      border-radius: 4px;
      font-size: 12px;
      word-break: break-all;
      min-height: 40px;
    }
    .progress-info {
      color: #aaa;
    }
  </style>
</head>
<body>
  <h2>🎵 YT Music Auto-Liker</h2>
  
  <div class="alert">
    💡 <strong>Note:</strong> To authorize actions, please make sure you are logged into <a href="https://music.youtube.com" target="_blank">YouTube Music</a> on this browser.
  </div>
  
  <label for="playlistUrl">Playlist URL (or ID)</label>
  <input type="text" id="playlistUrl" placeholder="e.g., https://music.youtube.com/playlist?list=PL...">
  
  <div class="options">
    <label>
      Delay (seconds):
      <input type="number" id="delayMs" value="1.0" min="0.5" step="0.5" style="width: 50px; background:#1e1e1e; border:1px solid #3f3f3f; color:#fff; padding:2px;">
    </label>
    <label style="display:flex; align-items:center; cursor:pointer;">
      <input type="checkbox" id="reverseOrder" checked style="margin-right:8px;">
      Start from the bottom (oldest first)
    </label>
  </div>

  <div style="display:flex; gap:10px; margin-top:20px;">
    <button id="startBtn" style="flex:1;">▶ Start</button>
    <button id="resumeBtn" style="display:none; flex:1; background-color:#ffaa00; color:#0f0f0f;">▶ Resume</button>
    <button id="pauseBtn" style="display:none; flex:1; background-color:#ffaa00; color:#0f0f0f;">⏸ Pause</button>
    <button id="stopBtn" style="display:none; flex:1; background-color:#555;">⏹ Stop</button>
  </div>
  
  <div id="status">Ready. Please paste a URL and click Start.</div>

  <script src="popup.js"></script>
</body>
</html>
